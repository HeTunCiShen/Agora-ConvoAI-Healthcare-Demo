<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthAI — Patient</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <script src="/lib/agora-rtc-sdk-ng/AgoraRTC_N-production.js"></script>
  <script src="/lib/agora-rtm/agora-rtm.js"></script>
</head>
<body>

  <!-- Profile selection screen -->
  <div id="profile-selection" class="profile-selection">
    <div class="selection-container">
      <h1>HealthAI</h1>
      <p class="subtitle">Select your profile to continue</p>
      <div class="profile-cards" id="patient-cards">
        <p style="color:var(--on-surface-variant)">Loading profiles…</p>
      </div>
    </div>
  </div>

  <!-- Main patient page (hidden until profile selected) -->
  <div id="main-page" class="hidden">
    <!-- Header -->
    <nav class="page-nav">
      <div class="page-nav-left">
        <span class="page-nav-brand">HealthAI</span>
      </div>
      <div class="page-nav-right">
        <button id="switch-user-btn" class="switch-user-btn">
          <span class="material-symbols-outlined" style="font-size:16px">swap_horiz</span>
          Switch Patient
        </button>
      </div>
    </nav>

    <!-- Top bar: profile only -->
    <div class="top-bar">
      <div class="profile-section" id="top-bar-profile"></div>
    </div>

    <!-- Fixed call controls: bottom-left (button on top, status below) -->
    <div class="call-controls-fixed">
      <button id="call-btn" class="btn primary">
        <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">phone_in_talk</span> Call AI Assistant</span>
        <span class="btn-loading" style="display:none">Connecting…</span>
      </button>
      <button id="end-call-btn" class="btn danger hidden">
        <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">call_end</span> End Call</span>
        <span class="btn-loading" style="display:none">Ending…</span>
      </button>
      <section id="agent-state" class="agent-state state-offline">
        <div class="state-indicator">
          <span class="state-dot"></span>
          <span class="state-text">offline</span>
        </div>
      </section>
    </div>

    <!-- Master-detail layout -->
    <div class="master-detail">
      <div class="master-panel" id="doctor-list">
        <div class="panel-title">Care Team</div>
      </div>
      <div class="detail-panel" id="detail-panel">
        <p class="empty-state">Select a doctor to view details</p>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chatToggle" class="chat-toggle" style="display:none">
    <span class="material-symbols-outlined">chat</span>
  </div>
  <div id="chatPanel" class="chat-panel">
    <div class="chat-header"><h3>Chat with AI</h3><button id="closeChatBtn" class="close-btn">&times;</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div id="typingIndicator" class="typing-indicator" style="display:none">
      <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <span>thinking…</span>
    </div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Start the conversation to begin chatting…" disabled />
      <button id="sendBtn" class="send-btn" disabled>
        <span class="material-symbols-outlined" style="font-size:18px">send</span>
      </button>
    </div>
    <div class="chat-actions"><button id="clearChatBtn" class="clear-btn">Clear Chat</button></div>
  </div>

  <script src="/utils/config.js"></script>
  <script src="/utils/audioVisualizer.js"></script>
  <script src="/utils/chat.js"></script>
  <script src="/shared/profile-modal.js"></script>
  <script src="/patient.js"></script>
</body>
</html>
